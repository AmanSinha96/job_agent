name: Job Agent — Indeed Sweep

# zip_recruiter/naukri/google dropped from the site list below — confirmed
# via live testing (network-blocked or returning zero rows). See cloud_run.py
# for details. Re-add them in the "Run cloud pipeline" step's --sites arg
# if/when they start working again.
#
# 4 runs/day at IST 08:41/13:41/17:41/21:41 (UTC 03:11/08:11/12:11/16:11).
# Minute shifted off :00 to :11 — GitHub Actions scheduled workflows queue
# behind everyone else's crons at round hour marks, and real run history
# showed delays growing to 2-4 hours by evening; an off-beat minute avoids
# the worst of that contention (doesn't guarantee exact-time delivery,
# nothing on the free tier can, but should meaningfully cut the delay).
# --hours-old is set per-trigger below to exactly cover the gap since this
# workflow's own previous run (floor 4h) — no gap in coverage, no need to
# guess a single fixed value.

on:
  schedule:
    - cron: "11 3 * * *"   # IST 08:41, covers last 11h
    - cron: "11 8 * * *"   # IST 13:41, covers last 5h
    - cron: "11 12 * * *"  # IST 17:41, covers last 4h
    - cron: "11 16 * * *"  # IST 21:41, covers last 4h
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest

    timeout-minutes: 40

    steps:

      # -------------------------------------------------------
      # Checkout Repository
      # -------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Python
      # -------------------------------------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # -------------------------------------------------------
      # Install dependencies
      # -------------------------------------------------------
      # No LibreOffice — resumes are emailed as DOCX (also parses more
      # reliably in most ATS than PDF), which avoids a ~1-2 min apt-get
      # install on every run.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_cloud.txt

      # -------------------------------------------------------
      # Gmail OAuth Token
      # -------------------------------------------------------

      - name: Restore Gmail token
        run: |
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > token.json
        continue-on-error: true

      # -------------------------------------------------------
      # Gmail Credentials
      # -------------------------------------------------------

      - name: Restore Gmail credentials
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json

      # -------------------------------------------------------
      # Verify master resume exists
      # -------------------------------------------------------

      - name: Verify master resume
        run: |
          if [ ! -f resume_base.docx ]; then
            echo "resume_base.docx not found."
            exit 1
          fi

      # -------------------------------------------------------
      # Determine freshness window for whichever cron entry fired this run
      # -------------------------------------------------------

      - name: Determine hours_old for this trigger
        id: hours
        run: |
          case "${{ github.event.schedule }}" in
            "11 3 * * *") echo "value=11" >> "$GITHUB_OUTPUT" ;;
            "11 8 * * *") echo "value=5" >> "$GITHUB_OUTPUT" ;;
            "11 12 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            "11 16 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            *) echo "value=24" >> "$GITHUB_OUTPUT" ;;  # manual workflow_dispatch — generous default
          esac

      # -------------------------------------------------------
      # Run Job Agent
      # -------------------------------------------------------

      - name: Run cloud pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXIES: ${{ secrets.PROXIES }}

          JOB_EMAIL: ${{ secrets.JOB_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

          FIRST_NAME: ${{ secrets.FIRST_NAME }}
          LAST_NAME: ${{ secrets.LAST_NAME }}

          PHONE: ${{ secrets.PHONE }}

          LINKEDIN_URL: ${{ secrets.LINKEDIN_URL }}
          GITHUB_URL: ${{ secrets.GITHUB_URL }}

          YEARS_EXP: ${{ secrets.YEARS_EXP }}
          SALARY_LPA: ${{ secrets.SALARY_LPA }}
          MIN_SALARY_LPA: ${{ secrets.MIN_SALARY_LPA }}
          EXPERIENCE_LEVEL: ${{ secrets.EXPERIENCE_LEVEL }}

        run: |
          python cloud_run.py --sites indeed,watchlist --hours-old ${{ steps.hours.outputs.value }}

      # -------------------------------------------------------
      # Upload generated resumes
      # -------------------------------------------------------

      - name: Upload generated resumes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-resumes
          path: |
            generated_resumes/**
          if-no-files-found: ignore

      # -------------------------------------------------------
      # Upload logs
      # -------------------------------------------------------

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-logs
          path: |
            *.log
          if-no-files-found: ignore

      # -------------------------------------------------------
      # Commit updated databases/cache
      # -------------------------------------------------------

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Job Agent Bot"

          git add data/jobs.db || true
          git add resume_cache.json || true
          git add generated_resumes/index.json || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update cache [skip ci]"

            # Plain `git push` was silently losing this commit whenever
            # main had moved since checkout (another workflow's commit, or
            # a manual push) — confirmed live: data/jobs.db had ZERO
            # commits in real history despite running for days, because
            # this step has no pull/rebase and continue-on-error swallowed
            # every rejected push. Cross-cycle job dedup was silently not
            # persisting as a result. Retry with a rebase onto the latest
            # main; jobs.db is a binary SQLite file so a real merge isn't
            # possible on conflict — `-X ours` keeps this run's freshly
            # scraped state, which loses whatever a concurrent run added
            # that this run doesn't know about, but that's a rare, minor
            # loss next to the previous near-100% silent failure rate.
            pushed=false
            for attempt in 1 2 3; do
              if git push; then
                pushed=true
                break
              fi
              echo "Push rejected (attempt $attempt/3) — fetching and rebasing onto latest main..."
              git fetch origin main
              if ! git rebase -X ours origin/main; then
                echo "Rebase conflict outside jobs.db/cache files — aborting this cycle's commit."
                git rebase --abort
                break
              fi
            done
            if [ "$pushed" != "true" ]; then
              echo "::warning::Could not push updated data/jobs.db after 3 attempts — this cycle's dedup state was not persisted."
            fi
          fi
        continue-on-error: true
