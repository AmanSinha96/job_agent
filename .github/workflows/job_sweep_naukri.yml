name: Job Agent — Naukri Sweep

# Naukri needs a real browser (Playwright + stealth) — jobspy's own Naukri
# scraper hits a 406 every time (confirmed live). Confirmed live from an
# actual GitHub Actions runner: ~3/4 requests succeed, ~1/4 hit an
# intermittent 403 — handled gracefully in naukri_playwright.py, not a
# reason to panic if the job count looks lower than expected some cycles.
#
# 5 runs/day at IST 00:41/09:41/12:41/16:41/18:41 (UTC 19:11/04:11/07:11/
# 11:11/13:11). Minute shifted off :00 to :11 — GitHub Actions scheduled
# workflows queue behind everyone else's crons at round hour marks, and
# real run history showed delays growing to 2-4 hours by evening; an
# off-beat minute avoids the worst of that contention. --hours-old is set
# per-trigger below to exactly cover the gap since this workflow's own
# previous run (floor 4h).

on:
  schedule:
    - cron: "11 19 * * *"  # IST 00:41, covers last 6h
    - cron: "11 4 * * *"   # IST 09:41, covers last 9h
    - cron: "11 7 * * *"   # IST 12:41, covers last 4h
    - cron: "11 11 * * *"  # IST 16:41, covers last 4h
    - cron: "11 13 * * *"  # IST 18:41, covers last 4h
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # -------------------------------------------------------
      # Checkout Repository
      # -------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Python
      # -------------------------------------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # -------------------------------------------------------
      # Install dependencies + Playwright browser
      # -------------------------------------------------------

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_cloud.txt
          playwright install --with-deps chromium

      # -------------------------------------------------------
      # Gmail OAuth Token
      # -------------------------------------------------------

      - name: Restore Gmail token
        run: |
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > token.json
        continue-on-error: true

      # -------------------------------------------------------
      # Gmail Credentials
      # -------------------------------------------------------

      - name: Restore Gmail credentials
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json

      # -------------------------------------------------------
      # Verify master resume exists
      # -------------------------------------------------------

      - name: Verify master resume
        run: |
          if [ ! -f resume_base.docx ]; then
            echo "resume_base.docx not found."
            exit 1
          fi

      # -------------------------------------------------------
      # Determine freshness window for whichever cron entry fired this run
      # -------------------------------------------------------

      - name: Determine hours_old for this trigger
        id: hours
        run: |
          case "${{ github.event.schedule }}" in
            "11 19 * * *") echo "value=6" >> "$GITHUB_OUTPUT" ;;
            "11 4 * * *") echo "value=9" >> "$GITHUB_OUTPUT" ;;
            "11 7 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            "11 11 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            "11 13 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            *) echo "value=4" >> "$GITHUB_OUTPUT" ;;  # manual workflow_dispatch — last 4h from trigger time, for on-demand checks
          esac

      # -------------------------------------------------------
      # Run Job Agent
      # -------------------------------------------------------

      - name: Run cloud pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXIES: ${{ secrets.PROXIES }}

          JOB_EMAIL: ${{ secrets.JOB_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

          FIRST_NAME: ${{ secrets.FIRST_NAME }}
          LAST_NAME: ${{ secrets.LAST_NAME }}

          PHONE: ${{ secrets.PHONE }}

          LINKEDIN_URL: ${{ secrets.LINKEDIN_URL }}
          GITHUB_URL: ${{ secrets.GITHUB_URL }}

          YEARS_EXP: ${{ secrets.YEARS_EXP }}
          SALARY_LPA: ${{ secrets.SALARY_LPA }}
          MIN_SALARY_LPA: ${{ secrets.MIN_SALARY_LPA }}
          EXPERIENCE_LEVEL: ${{ secrets.EXPERIENCE_LEVEL }}

        run: |
          python cloud_run.py --sites naukri --hours-old ${{ steps.hours.outputs.value }}

      # -------------------------------------------------------
      # Upload generated resumes
      # -------------------------------------------------------

      - name: Upload generated resumes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-resumes-naukri
          path: |
            generated_resumes/**
          if-no-files-found: ignore

      # -------------------------------------------------------
      # Upload logs
      # -------------------------------------------------------

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-logs-naukri
          path: |
            *.log
          if-no-files-found: ignore

      # -------------------------------------------------------
      # Commit updated databases/cache
      # -------------------------------------------------------

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Job Agent Bot"

          git add data/jobs.db || true
          git add resume_cache.json || true
          git add generated_resumes/index.json || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update cache (naukri) [skip ci]"

            # Plain `git push` was silently losing this commit whenever
            # main had moved since checkout (another workflow's commit, or
            # a manual push) — confirmed live: data/jobs.db had ZERO
            # commits in real history despite running for days, because
            # this step has no pull/rebase and continue-on-error swallowed
            # every rejected push. Cross-cycle job dedup was silently not
            # persisting as a result. Retry with a rebase onto the latest
            # main; jobs.db is a binary SQLite file so a real merge isn't
            # possible on conflict — `-X ours` keeps this run's freshly
            # scraped state, which loses whatever a concurrent run added
            # that this run doesn't know about, but that's a rare, minor
            # loss next to the previous near-100% silent failure rate.
            pushed=false
            for attempt in 1 2 3; do
              if git push; then
                pushed=true
                break
              fi
              echo "Push rejected (attempt $attempt/3) — fetching and rebasing onto latest main..."
              git fetch origin main
              if ! git rebase -X ours origin/main; then
                echo "Rebase conflict outside jobs.db/cache files — aborting this cycle's commit."
                git rebase --abort
                break
              fi
            done
            if [ "$pushed" != "true" ]; then
              echo "::warning::Could not push updated data/jobs.db after 3 attempts — this cycle's dedup state was not persisted."
            fi
          fi
        continue-on-error: true
