name: Job Agent — Naukri Sweep

# Naukri needs a real browser (Playwright + stealth) — jobspy's own Naukri
# scraper hits a 406 every time (confirmed live). Confirmed live from an
# actual GitHub Actions runner: ~3/4 requests succeed, ~1/4 hit an
# intermittent 403 — handled gracefully in naukri_playwright.py, not a
# reason to panic if the job count looks lower than expected some cycles.
#
# 5 runs/day at IST 00:30/09:30/12:30/16:30/18:30 (UTC 19:00/04:00/07:00/
# 11:00/13:00). --hours-old is set per-trigger below to exactly cover the
# gap since this workflow's own previous run (floor 4h).

on:
  schedule:
    - cron: "0 19 * * *"  # IST 00:30, covers last 6h
    - cron: "0 4 * * *"   # IST 09:30, covers last 9h
    - cron: "0 7 * * *"   # IST 12:30, covers last 4h
    - cron: "0 11 * * *"  # IST 16:30, covers last 4h
    - cron: "0 13 * * *"  # IST 18:30, covers last 4h
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # -------------------------------------------------------
      # Checkout Repository
      # -------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # Python
      # -------------------------------------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # -------------------------------------------------------
      # Install dependencies + Playwright browser
      # -------------------------------------------------------

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_cloud.txt
          playwright install --with-deps chromium

      # -------------------------------------------------------
      # Gmail OAuth Token
      # -------------------------------------------------------

      - name: Restore Gmail token
        run: |
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > token.json
        continue-on-error: true

      # -------------------------------------------------------
      # Gmail Credentials
      # -------------------------------------------------------

      - name: Restore Gmail credentials
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS }}' > credentials.json

      # -------------------------------------------------------
      # Verify master resume exists
      # -------------------------------------------------------

      - name: Verify master resume
        run: |
          if [ ! -f resume_base.docx ]; then
            echo "resume_base.docx not found."
            exit 1
          fi

      # -------------------------------------------------------
      # Determine freshness window for whichever cron entry fired this run
      # -------------------------------------------------------

      - name: Determine hours_old for this trigger
        id: hours
        run: |
          case "${{ github.event.schedule }}" in
            "0 19 * * *") echo "value=6" >> "$GITHUB_OUTPUT" ;;
            "0 4 * * *") echo "value=9" >> "$GITHUB_OUTPUT" ;;
            "0 7 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            "0 11 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            "0 13 * * *") echo "value=4" >> "$GITHUB_OUTPUT" ;;
            *) echo "value=24" >> "$GITHUB_OUTPUT" ;;  # manual workflow_dispatch — generous default
          esac

      # -------------------------------------------------------
      # Run Job Agent
      # -------------------------------------------------------

      - name: Run cloud pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXIES: ${{ secrets.PROXIES }}

          JOB_EMAIL: ${{ secrets.JOB_EMAIL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

          FIRST_NAME: ${{ secrets.FIRST_NAME }}
          LAST_NAME: ${{ secrets.LAST_NAME }}

          PHONE: ${{ secrets.PHONE }}

          LINKEDIN_URL: ${{ secrets.LINKEDIN_URL }}
          GITHUB_URL: ${{ secrets.GITHUB_URL }}

          YEARS_EXP: ${{ secrets.YEARS_EXP }}
          SALARY_LPA: ${{ secrets.SALARY_LPA }}
          MIN_SALARY_LPA: ${{ secrets.MIN_SALARY_LPA }}
          EXPERIENCE_LEVEL: ${{ secrets.EXPERIENCE_LEVEL }}

        run: |
          python cloud_run.py --sites naukri --hours-old ${{ steps.hours.outputs.value }}

      # -------------------------------------------------------
      # Upload generated resumes
      # -------------------------------------------------------

      - name: Upload generated resumes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-resumes-naukri
          path: |
            generated_resumes/**
          if-no-files-found: ignore

      # -------------------------------------------------------
      # Upload logs
      # -------------------------------------------------------

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-agent-logs-naukri
          path: |
            *.log
          if-no-files-found: ignore

      # -------------------------------------------------------
      # Commit updated databases/cache
      # -------------------------------------------------------

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Job Agent Bot"

          git add data/jobs.db || true
          git add resume_cache.json || true
          git add generated_resumes/index.json || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update cache (naukri) [skip ci]"
            git push
          fi
        continue-on-error: true
